<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login – V2S Foods</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { margin: 0; min-height: 100vh; background: #f5f5f0; font-family: 'Poppins', sans-serif; display: flex; }
        .auth-split { display: flex; width: 100%; min-height: 100vh; }
        .auth-panel-left {
            flex: 1; background: linear-gradient(135deg, #2c3a0f 0%, #3f4f24 50%, #5a6e2e 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 60px 40px; color: white; position: relative; overflow: hidden;
        }
        .auth-panel-left::before {
            content: ''; position: absolute; top: -100px; right: -100px;
            width: 400px; height: 400px; background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        .auth-panel-left::after {
            content: ''; position: absolute; bottom: -80px; left: -80px;
            width: 300px; height: 300px; background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        .auth-brand-logo { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .auth-brand-logo span { color: #c8d993; }
        .auth-brand-sub { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px; }
        .auth-features { list-style: none; padding: 0; margin: 0; }
        .auth-features li {
            display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
            font-size: 14px; color: rgba(255,255,255,0.85);
        }
        .auth-features li i { color: #c8d993; width: 20px; font-size: 16px; }
        .auth-panel-right {
            width: 460px; display: flex; align-items: center; justify-content: center;
            padding: 40px 50px; background: white;
        }
        .auth-form-wrap { width: 100%; }
        .auth-portal-badge {
            display: inline-block; background: #f0f4e8; color: #3f4f24;
            font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 20px; margin-bottom: 24px;
        }
        .auth-title { font-size: 28px; font-weight: 700; color: #1a1a1a; margin: 0 0 6px; }
        .auth-subtitle { font-size: 14px; color: #888; margin: 0 0 36px; }
        .form-field { margin-bottom: 20px; }
        .form-field label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
        .form-field input {
            width: 100%; padding: 13px 16px 13px 44px; border: 1.5px solid #e0e0e0;
            border-radius: 12px; font-size: 14px; font-family: 'Poppins', sans-serif;
            background: #fafafa; transition: all 0.2s; box-sizing: border-box; outline: none;
        }
        .form-field input:focus { border-color: #3f4f24; background: white; box-shadow: 0 0 0 3px rgba(63,79,36,0.08); }
        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #3f4f24, #5a6e2e);
            color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(63,79,36,0.3); }
        .auth-error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .auth-footer-link { text-align: center; margin-top: 28px; font-size: 13px; color: #888; }
        .auth-footer-link a { color: #3f4f24; font-weight: 600; text-decoration: none; }
        .auth-footer-link a:hover { text-decoration: underline; }
        @media(max-width: 768px) {
            .auth-panel-left { display: none; }
            .auth-panel-right { width: 100%; padding: 40px 28px; }
        }
    </style>
</head>
<body>
<div class="auth-split">
    <!-- Left decorative panel -->
    <div class="auth-panel-left">
        <div class="auth-brand-logo">V2S <span>Foods</span></div>
        <div class="auth-brand-sub">Admin Portal</div>
        <ul class="auth-features">
            <li><i class="fas fa-box-open"></i> Manage products & inventory</li>
            <li><i class="fas fa-receipt"></i> View & process orders</li>
            <li><i class="fas fa-utensils"></i> Add & edit recipe blog</li>
            <li><i class="fas fa-chart-bar"></i> Billing & revenue summary</li>
            <li><i class="fas fa-users"></i> Customer management</li>
        </ul>
    </div>

    <!-- Right form panel -->
    <div class="auth-panel-right">
        <div class="auth-form-wrap">
            <div class="auth-portal-badge"><i class="fas fa-shield-alt"></i> &nbsp;Admin Portal</div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to manage your V2S Foods dashboard</p>

            {% if error %}
            <div class="auth-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="form-field">
                    <label>Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="admin@v2sfoods.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-field">
                    <label>Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In</button>
            </form>

            <div class="auth-footer-link">
                New admin? <a href="/admin/register">Create account</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
