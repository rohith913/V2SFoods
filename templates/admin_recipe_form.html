{% extends "base.html" %}
{% block content %}
<section class="page-section">
  <div class="container" style="max-width:900px;">

    <div class="section-head">
      <div>
        <small>Admin Panel</small>
        <h2>{% if recipe %}Edit Recipe{% else %}Add New Recipe{% endif %}</h2>
      </div>
      <a href="/admin/recipes" class="btn-outline"><i class="fas fa-arrow-left"></i> Back to Recipes</a>
    </div>

    <form method="POST" enctype="multipart/form-data"
          action="{% if recipe %}/admin/recipes/edit/{{ recipe.id }}{% else %}/admin/recipes/add{% endif %}">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

        <!-- Title -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Recipe Title *</label>
          <input type="text" name="title" value="{{ recipe.title if recipe else '' }}" required
                 placeholder="e.g. Ragi Malt Porridge" class="form-control">
        </div>

        <!-- Emoji & Difficulty -->
        <div class="form-group">
          <label>Emoji</label>
          <input type="text" name="emoji" value="{{ recipe.emoji if recipe else '🍲' }}" class="form-control" placeholder="🍲">
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select name="difficulty" class="form-control">
            {% for d in ['Very Easy','Easy','Medium','Hard'] %}
            <option value="{{ d }}" {% if recipe and recipe.difficulty == d %}selected{% endif %}>{{ d }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Category & Time -->
        <div class="form-group">
          <label>Category</label>
          <input type="text" name="category" value="{{ recipe.category if recipe else '' }}" class="form-control"
                 placeholder="e.g. Millet · Breakfast">
        </div>
        <div class="form-group">
          <label>Time (e.g. 20 minutes)</label>
          <input type="text" name="time_minutes" value="{{ recipe.time_minutes if recipe else '' }}" class="form-control"
                 placeholder="20 minutes">
        </div>

        <!-- Servings & Status -->
        <div class="form-group">
          <label>Servings</label>
          <input type="text" name="servings" value="{{ recipe.servings if recipe else '' }}" class="form-control"
                 placeholder="2 servings">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status" class="form-control">
            <option value="ACTIVE" {% if not recipe or recipe.status == 'ACTIVE' %}selected{% endif %}>Active</option>
            <option value="INACTIVE" {% if recipe and recipe.status == 'INACTIVE' %}selected{% endif %}>Inactive</option>
          </select>
        </div>

        <!-- Description -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Short Description</label>
          <input type="text" name="description" value="{{ recipe.description if recipe else '' }}" class="form-control"
                 placeholder="A brief one-line description of the recipe">
        </div>

        <!-- About -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>About / Story</label>
          <textarea name="about" class="form-control" rows="3"
                    placeholder="A longer paragraph about the recipe's background">{{ recipe.about if recipe else '' }}</textarea>
        </div>

        <!-- Recipe Image -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Recipe Image</label>
          {% if recipe and recipe.image_url %}
          <div style="margin-bottom:10px;">
            <img src="{{ recipe.image_url }}" alt="Current" style="height:80px;border-radius:8px;object-fit:cover;">
            <small style="display:block;color:var(--text-muted);margin-top:4px;">Current image – upload new to replace</small>
          </div>
          {% endif %}
          <input type="file" name="image_file" accept="image/*" class="form-control">
        </div>

        <!-- Ingredients -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Ingredients <small style="color:var(--text-muted);font-weight:400;">(one per line)</small></label>
          <textarea name="ingredients_text" class="form-control" rows="6"
                    placeholder="4 tbsp V2S Ragi Health Mix&#10;500 ml milk&#10;2 tbsp jaggery">{{ recipe.ingredients_text if recipe else '' }}</textarea>
        </div>

        <!-- Steps -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Cooking Steps <small style="color:var(--text-muted);font-weight:400;">(one step per line)</small></label>
          <textarea name="steps_text" class="form-control" rows="6"
                    placeholder="Mix the ragi with cold milk until smooth.&#10;Heat the remaining milk in a saucepan.">{{ recipe.steps_text if recipe else '' }}</textarea>
        </div>

        <!-- Tips -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Tips <small style="color:var(--text-muted);font-weight:400;">(one tip per line)</small></label>
          <textarea name="tips_text" class="form-control" rows="4"
                    placeholder="Always mix ragi with cold liquid first to prevent lumps.">{{ recipe.tips_text if recipe else '' }}</textarea>
        </div>

        <!-- Nutrition -->
        <div class="form-group" style="grid-column:1/-1;">
          <label>Nutrition <small style="color:var(--text-muted);font-weight:400;">(format: Key: Value, one per line)</small></label>
          <textarea name="nutrition_text" class="form-control" rows="5"
                    placeholder="Calories: 210 kcal&#10;Protein: 8 g&#10;Carbs: 34 g&#10;Fibre: 4 g">{{ recipe.nutrition_text if recipe else '' }}</textarea>
        </div>

      </div><!-- /grid -->

      <div style="display:flex;gap:12px;margin-top:24px;">
        <button type="submit" class="btn-primary">
          <i class="fas fa-save"></i>
          {% if recipe %}Update Recipe{% else %}Save Recipe{% endif %}
        </button>
        <a href="/admin/recipes" class="btn-outline">Cancel</a>
      </div>
    </form>

  </div>
</section>

<style>
.form-group { display:flex;flex-direction:column;gap:6px; }
.form-group label { font-weight:600;font-size:13px;color:var(--text-dark); }
.form-control {
  padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;background:#fafafa;transition:border 0.2s;
}
.form-control:focus { outline:none;border-color:var(--olive-main);background:white; }
textarea.form-control { resize:vertical; }
</style>
{% endblock %}
