<!DOCTYPE html>
<html>
<head>
    <title>Admin Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <span class="brand-label">Admin Portal</span>
            <h2>Admin Register</h2>
            <p class="brand-subtitle">Create your admin account to manage the V2S Foods platform.</p>
        </div>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            <input type="text" name="admin_name" placeholder="Admin Name" required>
            <input type="text" name="mobile" placeholder="Mobile Number" required>
            <input type="email" name="email" placeholder="Email ID" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn-maroon">Register</button>
        </form>

        <p class="login-note">
            Already registered?
            <a href="/admin/login">Login</a>
        </p>
    </div>
</div>

</body>
</html>
