<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <span class="brand-label">V2S Foods</span>
            <p class="brand-subtitle">Millexa HealthMix · Traditional wellness, globally delivered.</p>
            <h2>User Login</h2>
            <p class="brand-tagline">Securely access your account and manage your wellness orders.</p>
        </div>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn-maroon">Login</button>
        </form>

        <p class="login-note">
            New user?
            <a href="/user/register">Register</a>
        </p>
    </div>
</div>

</body>
</html>
